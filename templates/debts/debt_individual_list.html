{% extends "base.html" %}
{% block page_title %}Individual Debts{% endblock %}
{% block content %}
{% include "core/components/page_header.html" with title="Individual Debts" %}

<form id="individual-debts-search-form" method="get"
      hx-get="{% url 'debts:individual' %}"
      hx-target="#individual-debts-results"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-indicator="#individual-debts-search-spinner"
      hx-trigger="input changed delay:300ms from:find [name='q'], submit"
      class="bg-white/90 dark:bg-slate-800/70 backdrop-blur-sm rounded-xl shadow-md border border-white/60 dark:border-white/10 p-4 mb-4">
    <div class="flex flex-wrap items-end gap-3">
        <div class="flex-1 min-w-[180px]">
            <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">Search</label>
            <div class="relative">
                <input type="text" name="q" value="{{ q }}" placeholder="Customer name…" autocomplete="off"
                       class="block w-full rounded-md border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white pl-3 pr-8 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                <svg id="individual-debts-search-spinner" class="htmx-indicator absolute right-2.5 top-1/2 -translate-y-1/2 h-4 w-4 animate-spin text-gray-400 dark:text-slate-500"
                     xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </div>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="rounded-md bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2">Search</button>
            {% if q %}<a href="{% url 'debts:individual' %}" class="rounded-md border border-gray-300 dark:border-slate-600 hover:bg-gray-50 dark:hover:bg-slate-800/40 text-gray-700 dark:text-slate-300 text-sm font-medium px-4 py-2">Clear</a>{% endif %}
        </div>
    </div>
</form>

<div id="individual-debts-results">
    {% include "debts/debt_individual_results.html" %}
</div>
{% endblock %}
